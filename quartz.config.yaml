configuration:
  pageTitle: "むじょか"
  pageTitleSuffix: "｜むじょか"
  enableSPA: true
  enablePopovers: true
  analytics: ~
  locale: en-US
  baseUrl: mutichung.github.io/mujoka
  ignorePatterns:
    - private
    - templates
    - .obsidian
  defaultDateType: created
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Chiron GoRound TC
      body:  Chiron GoRound TC
      code: Fira Code
    colors:
      lightMode:
        light: "#FAFAFA"
        lightgray: "#e5e5e5"
        gray: "#939393"
        darkgray: "#252525"
        dark: "#2b2b2b"
        secondary: "#284b63"
        tertiary: "#738f88"
        highlight: "rgba(143, 159, 169, 0.15)"
        textHighlight: "#fff23688"
      darkMode:
        light: "#1F2328"
        lightgray: "#393639"
        gray: "#646464"
        darkgray: "#d4d4d4"
        dark: "#ebebec"
        secondary: "#8c9da8"
        tertiary: "#84a59d"
        highlight: "rgba(143, 159, 169, 0.15)"
        textHighlight: "#b3aa0288"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: one-light
        dark: one-dark-pro
      keepBackground: true
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: absolute
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      visibility: icon
      iterations: 600000
      passwordField: password
    order: 900
    layout:
      position: body
      priority: 100
      display: all
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: false
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      title: 目錄
      folderClickBehavior: link
      folderDefaultState: collapsed
      useSavedState: false
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 80
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      # condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options:
        repo: mutichung/mujoka
        repoId: R_kgDOMGmoGw
        category: Announcements
        categoryId: DIC_kwDOMGmoG84Cf9Iv
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        # GitHub: https://github.com/mutichung
        Mika: https://www.instagram.com/mika_indahouse/
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: 最近
      limit: 5
      showTags: true
      linkToMore: false
    layout:
      position: left
      priority: 60
      display: desktop-only
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options:
      linkResolution: absolute
      defaultView: cards
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - director
        - released
        - english-title
        - original-title
        - joanna
        - muti
        - ingredients
      excludedProperties: []
      hidePropertiesView: false
      delimiters: "---"
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
